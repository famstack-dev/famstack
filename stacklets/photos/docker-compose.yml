# stacklets/photos/docker-compose.yml — Immich
#
# Family photo library and mobile backup. Immich handles uploads,
# face recognition, and album sharing — all on your own hardware.
#
# All persistent data paths come from .env — never hardcoded here.
# The model-cache volume is local to this compose file (not a bind mount)
# because the ML cache is ephemeral and safe to lose on rebuild.

name: stack-photos

services:
  stack-photos-server:
    container_name: stack-photos-server
    image: ghcr.io/immich-app/immich-server:${IMMICH_VERSION:-release}
    labels:
      - "com.centurylinklabs.watchtower.enable=${WATCHTOWER_ENABLE:-true}"
    networks:
      - stack
    volumes:
      # Photo uploads — the actual library. Back this up.
      - ${UPLOAD_LOCATION}:/data
      # Sync container timezone with the host so photo timestamps are correct
      - /etc/localtime:/etc/localtime:ro
    env_file:
      - .env
    ports:
      - "${PORT_BIND_IP:-127.0.0.1}:42010:2283"
    depends_on:
      - stack-photos-redis
      - stack-photos-db
    restart: unless-stopped
    healthcheck:
      disable: false

  stack-photos-ml:
    container_name: stack-photos-ml
    image: ghcr.io/immich-app/immich-machine-learning:${IMMICH_VERSION:-release}
    labels:
      - "com.centurylinklabs.watchtower.enable=${WATCHTOWER_ENABLE:-true}"
    # Apple Silicon note: Immich ML runs on CPU here — GPU acceleration via
    # Metal is not yet supported in the Docker image. Still fast enough for
    # face recognition and CLIP search on M-series chips.
    networks:
      - stack
    volumes:
      - model-cache:/cache
    env_file:
      - .env
    restart: unless-stopped
    healthcheck:
      disable: false

  stack-photos-redis:
    container_name: stack-photos-redis
    image: docker.io/valkey/valkey:8-alpine
    labels:
      - "com.centurylinklabs.watchtower.enable=${WATCHTOWER_ENABLE:-true}"
    networks:
      - stack
    healthcheck:
      test: ["CMD-SHELL", "redis-cli ping | grep -q PONG"]
    restart: unless-stopped

  stack-photos-db:
    container_name: stack-photos-db
    image: ghcr.io/immich-app/postgres:14-vectorchord0.4.3-pgvectors0.2.0
    labels:
      - "com.centurylinklabs.watchtower.enable=${WATCHTOWER_ENABLE:-true}"
    networks:
      - stack
    environment:
      POSTGRES_PASSWORD: ${DB_PASSWORD}
      POSTGRES_USER: ${DB_USERNAME}
      POSTGRES_DB: ${DB_DATABASE_NAME}
      POSTGRES_INITDB_ARGS: '--data-checksums'
    volumes:
      - ${DB_DATA_LOCATION}:/var/lib/postgresql/data
    restart: unless-stopped
    healthcheck:
      disable: false

volumes:
  model-cache:

networks:
  stack:
    external: true
