# stacklets/chatai/docker-compose.yml — Open WebUI
#
# Chat interface that ties together the full voice assistant pipeline:
#   speak → Whisper transcribes → oMLX thinks → Piper speaks back
#
# LLM and Whisper run natively on macOS (Metal GPU), reached via
# host.docker.internal. TTS runs in the ai stacklet's stack-ai-speech
# container, reached by service name on the stack network.

name: stack-chatai

services:
  stack-chatai:
    container_name: stack-chatai
    image: ghcr.io/open-webui/open-webui:main
    labels:
      - "com.centurylinklabs.watchtower.enable=${WATCHTOWER_ENABLE:-true}"
    networks:
      - stack
    extra_hosts:
      # oMLX and Whisper run natively on macOS (Metal GPU requires it)
      - "host.docker.internal:host-gateway"
    volumes:
      - ${CHATAI_DATA_DIR}:/app/backend/data
    environment:
      # LLM
      OPENAI_API_BASE_URL: ${OPENAI_API_URL}
      OPENAI_API_KEY: ${OPENAI_API_KEY:-local}
      # Auth
      WEBUI_AUTH: ${WEBUI_AUTH:-true}
      WEBUI_ADMIN_NAME: ${WEBUI_ADMIN_NAME}
      WEBUI_ADMIN_EMAIL: ${WEBUI_ADMIN_EMAIL}
      WEBUI_ADMIN_PASSWORD: ${WEBUI_ADMIN_PASSWORD}
      # Speech-to-text — native whisper.cpp on host
      AUDIO_STT_ENGINE: ${AUDIO_STT_ENGINE}
      AUDIO_STT_OPENAI_API_BASE_URL: ${AUDIO_STT_OPENAI_API_BASE_URL}
      AUDIO_STT_OPENAI_API_KEY: ${AUDIO_STT_OPENAI_API_KEY:-unused}
      # Text-to-speech — Piper in ai stacklet's container
      AUDIO_TTS_ENGINE: ${AUDIO_TTS_ENGINE}
      AUDIO_TTS_OPENAI_API_BASE_URL: ${AUDIO_TTS_OPENAI_API_BASE_URL}
      AUDIO_TTS_API_KEY: ${AUDIO_TTS_API_KEY:-unused}
      AUDIO_TTS_VOICE: ${AUDIO_TTS_VOICE:-alloy}
      # Tools server — OpenAPI-compatible endpoints for LLM tool calling
      TOOL_SERVER_CONNECTIONS: ${TOOL_SERVER_CONNECTIONS:-[]}
    ports:
      - "${PORT_BIND_IP:-127.0.0.1}:42050:8080"
    restart: unless-stopped

networks:
  stack:
    external: true
