# stacklet.toml — test stacklet
#
# Minimal stacklet for integration testing. Uses Alpine (5 MB) so it
# starts in ~1 second. Exercises the full lifecycle: hooks, env
# rendering, secrets, health checks — without the weight of a real
# service.
#
# Not shown in stack list by default (category = "test").

id          = "test"
name        = "Test"
description = "Integration test stacklet (Alpine)"
version     = "0.1.0"
category    = "test"
port        = 42099

hints = [
    "Test service running on {url}",
]

[env]
generate = ["TEST_SECRET"]

[env.defaults]
TEST_DATA_DIR = "{data_dir}/test"
TZ            = "{timezone}"
TEST_ADMIN    = "{admin_username}"

[health]
url    = "http://localhost:42099/"
expect = "200"
